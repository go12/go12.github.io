
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bw-blue: #175DDC;
  --bw-deep: #0C3276;
  --bw-offwhite: #F3F6F9;
  --bw-lightgrey: #D8E2EB;
  --bw-medgrey: #99A7B5;
  --bw-teal: #2CDDE9;
  --bw-teal-light: #A2F4FD;
  --bw-green: #7BF1A8;
  --bw-red: #FF6550;
  --bw-yellow: #FDC700;
  --bw-black: #000000;
  --bw-white: #FFFFFF;
}
body { font-family: 'Inter', sans-serif; }
.outer { max-width: 680px; margin: 0 auto; padding: 0 24px; }
.hero { text-align: center; padding: 2rem 0 1.25rem; }
.hero h1 { font-size: 26px; font-weight: 600; color: var(--bw-deep); line-height: 1.25; margin-bottom: 6px; letter-spacing: -0.02em; }
.hero p { font-size: 13px; color: var(--bw-medgrey); max-width: 440px; margin: 0 auto; line-height: 1.55; }
.controls { display: flex; gap: 20px; margin: 0 0 1.25rem; flex-wrap: wrap; }
.ctrl-group { flex: 1; min-width: 170px; }
.ctrl-group label { display: block; font-size: 11px; color: var(--bw-medgrey); margin-bottom: 4px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; }
.ctrl-group .val { font-size: 20px; font-weight: 600; color: var(--bw-deep); margin-bottom: 3px; }
.ctrl-group input[type=range] { width: 100%; height: 6px; -webkit-appearance: none; appearance: none; background: var(--bw-lightgrey); border-radius: 3px; outline: none; cursor: pointer; }
.ctrl-group input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: var(--bw-blue); border: 3px solid var(--bw-white); box-shadow: 0 1px 4px rgba(12,50,118,0.25); cursor: pointer; }
.ctrl-group input[type=range]::-moz-range-thumb { width: 18px; height: 18px; border-radius: 50%; background: var(--bw-blue); border: 3px solid var(--bw-white); box-shadow: 0 1px 4px rgba(12,50,118,0.25); cursor: pointer; }
.phase-toggle { display: flex; gap: 0; margin: 0 0 1.25rem; border-radius: 36px; overflow: hidden; border: 2px solid var(--bw-lightgrey); background: var(--bw-offwhite); }
.phase-btn { flex: 1; padding: 11px 8px; font-size: 13px; font-weight: 500; text-align: center; cursor: pointer; border: none; background: transparent; color: var(--bw-medgrey); transition: all 0.3s; font-family: inherit; border-radius: 36px; }
.phase-btn.active[data-phase="current"] { background: var(--bw-red); color: var(--bw-white); }
.phase-btn.active[data-phase="protected"] { background: var(--bw-blue); color: var(--bw-white); }
.viz-area { margin: 0 0 1rem; }
.app-grid { display: flex; flex-wrap: wrap; gap: 3px; padding: 14px; border-radius: 16px; background: var(--bw-offwhite); border: 1px solid var(--bw-lightgrey); min-height: 100px; }
.app-dot { width: 10px; height: 10px; border-radius: 3px; transition: background 0.35s; }
.app-dot.sso { background: var(--bw-blue); }
.app-dot.gap { background: var(--bw-red); opacity: 0.82; }
.app-dot.pwm { background: var(--bw-teal); }
.legend-bar { display: flex; gap: 16px; margin: 8px 0 0 4px; font-size: 12px; color: var(--bw-medgrey); flex-wrap: wrap; }
.legend-bar span { display: flex; align-items: center; gap: 5px; }
.legend-bar .dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }
.metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin: 1.25rem 0; }
.metric { background: var(--bw-offwhite); border: 1px solid var(--bw-lightgrey); border-radius: 12px; padding: 12px 14px; }
.metric .label { font-size: 10px; color: var(--bw-medgrey); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 3px; font-weight: 500; }
.metric .number { font-size: 18px; font-weight: 600; }
.metric .number.danger { color: var(--bw-red); }
.metric .number.safe { color: var(--bw-deep); }
.bar-chart { margin: 1rem 0; }
.bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; }
.bar-label { font-size: 11px; color: var(--bw-medgrey); width: 105px; text-align: right; flex-shrink: 0; font-weight: 500; }
.bar-track { flex: 1; height: 24px; background: var(--bw-offwhite); border-radius: 36px; overflow: hidden; border: 1px solid var(--bw-lightgrey); }
.bar-fill { height: 100%; border-radius: 36px; transition: width 0.5s ease; display: flex; align-items: center; justify-content: flex-end; padding-right: 8px; font-size: 11px; font-weight: 600; color: var(--bw-white); min-width: 34px; }
.bar-fill.sso { background: var(--bw-blue); }
.bar-fill.gap { background: var(--bw-red); }
.bar-fill.pwm { background: var(--bw-teal); color: var(--bw-deep); }
.risk-section { margin: 1.25rem 0 0.75rem; padding: 16px 20px; border-radius: 16px; transition: all 0.35s; }
.risk-section.danger { border: 1px solid #FFB8AD; background: #FFF0ED; }
.risk-section.safe { border: 1px solid #A2F4FD; background: #EBF9FF; }
.risk-section h3 { font-size: 13px; font-weight: 600; margin-bottom: 5px; }
.risk-section.danger h3 { color: #C0392B; }
.risk-section.safe h3 { color: var(--bw-deep); }
.risk-section p { font-size: 12.5px; line-height: 1.6; }
.risk-section.danger p { color: #993D33; }
.risk-section.safe p { color: #0C3276; }

.cost-callout { margin: 0 0 1rem; border-radius: 16px; overflow: hidden; transition: all 0.35s; }
.cost-callout.danger { background: linear-gradient(135deg, #FF6550 0%, #D94432 100%); }
.cost-callout.safe { background: linear-gradient(135deg, #175DDC 0%, #0C3276 100%); }
.cost-inner { padding: 24px 28px; }
.cost-eyebrow { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
.cost-callout.danger .cost-eyebrow { color: rgba(255,255,255,0.7); }
.cost-callout.safe .cost-eyebrow { color: rgba(255,255,255,0.65); }
.cost-headline { font-size: 28px; font-weight: 700; color: var(--bw-white); line-height: 1.2; margin-bottom: 10px; letter-spacing: -0.02em; }
.cost-body { font-size: 13px; line-height: 1.6; color: rgba(255,255,255,0.82); }
.cost-divider { height: 1px; background: rgba(255,255,255,0.15); margin: 0 28px; }
.cost-footer { display: flex; align-items: center; gap: 10px; padding: 14px 28px; }
.cost-icon { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; flex-shrink: 0; }
.cost-callout.danger .cost-icon { background: rgba(255,255,255,0.2); color: var(--bw-white); }
.cost-callout.safe .cost-icon { background: rgba(255,255,255,0.2); color: var(--bw-white); }
.cost-footer-text { font-size: 12px; color: rgba(255,255,255,0.72); line-height: 1.45; }

.bw-shield { display: inline-flex; align-items: center; gap: 6px; margin-bottom: 10px; }
.bw-shield svg { width: 22px; height: 22px; }
</style>

<div class="outer">
  <div class="hero">
    <div class="bw-shield">
      <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M16 2L4 7v9c0 7.73 5.12 14.96 12 17 6.88-2.04 12-9.27 12-17V7L16 2z" fill="#175DDC"/>
        <path d="M16 6l-8 3.5v6c0 5.41 3.58 10.47 8 11.9 4.42-1.43 8-6.49 8-11.9v-6L16 6z" fill="#fff" fill-opacity=".2"/>
      </svg>
    </div>
    <h1>The SSO coverage gap</h1>
    <p>Most enterprises protect only a fraction of their apps with SSO. See how a password manager closes the gap.</p>
  </div>

  <div class="controls">
    <div class="ctrl-group">
      <label>Total applications</label>
      <div class="val" id="total-val">800</div>
      <input type="range" min="100" max="5000" step="50" value="800" id="total-slider" oninput="update()">
    </div>
    <div class="ctrl-group">
      <label>SSO coverage</label>
      <div class="val" id="sso-val">25%</div>
      <input type="range" min="5" max="80" step="1" value="25" id="sso-slider" oninput="update()">
    </div>
    <div class="ctrl-group">
      <label>Avg. cost per breach</label>
      <div class="val" id="cost-val">$4.5M</div>
      <input type="range" min="1" max="15" step="0.5" value="4.5" id="cost-slider" oninput="update()">
    </div>
  </div>

  <div class="phase-toggle">
    <button class="phase-btn active" data-phase="current" onclick="setPhase('current')">Current state: SSO only</button>
    <button class="phase-btn" data-phase="protected" onclick="setPhase('protected')">With Bitwarden</button>
  </div>

  <div class="viz-area">
    <div class="app-grid" id="app-grid"></div>
    <div class="legend-bar" id="legend"></div>
  </div>

  <div class="metrics" id="metrics"></div>
  <div class="bar-chart" id="bar-chart"></div>
  <div class="risk-section" id="risk-box"></div>
  <div class="cost-callout" id="cost-box"></div>
</div>

<script>
let phase = 'current';

function setPhase(p) {
  phase = p;
  document.querySelectorAll('.phase-btn').forEach(b => b.classList.toggle('active', b.dataset.phase === p));
  update();
}

function update() {
  const total = parseInt(document.getElementById('total-slider').value);
  const ssoPct = parseInt(document.getElementById('sso-slider').value);
  const costM = parseFloat(document.getElementById('cost-slider').value);

  document.getElementById('total-val').textContent = total.toLocaleString();
  document.getElementById('sso-val').textContent = ssoPct + '%';
  document.getElementById('cost-val').textContent = '$' + costM.toFixed(1) + 'M';

  const ssoCount = Math.round(total * ssoPct / 100);
  const gapCount = total - ssoCount;

  const maxDots = 400;
  const scale = total > maxDots ? maxDots / total : 1;
  const dotTotal = Math.min(total, maxDots);
  const dotSSO = Math.round(ssoCount * scale);
  const dotGap = dotTotal - dotSSO;

  let html = '';
  for (let i = 0; i < dotSSO; i++) html += '<div class="app-dot sso"></div>';
  if (phase === 'current') {
    for (let i = 0; i < dotGap; i++) html += '<div class="app-dot gap"></div>';
  } else {
    for (let i = 0; i < dotGap; i++) html += '<div class="app-dot pwm"></div>';
  }
  document.getElementById('app-grid').innerHTML = html;

  const leg = document.getElementById('legend');
  if (phase === 'current') {
    leg.innerHTML = `<span><span class="dot" style="background:var(--bw-blue)"></span>SSO protected (${ssoCount.toLocaleString()})</span><span><span class="dot" style="background:var(--bw-red)"></span>Unprotected (${gapCount.toLocaleString()})</span>`;
  } else {
    leg.innerHTML = `<span><span class="dot" style="background:var(--bw-blue)"></span>SSO protected (${ssoCount.toLocaleString()})</span><span><span class="dot" style="background:var(--bw-teal)"></span>Bitwarden protected (${gapCount.toLocaleString()})</span>`;
  }

  const unprotectedPct = phase === 'current' ? (100 - ssoPct) : 0;
  const pwmPct = phase === 'protected' ? (100 - ssoPct) : 0;
  const riskMult = phase === 'current' ? (gapCount / total) : 0.02;
  const estRisk = costM * riskMult * 0.15;
  const credReuse = phase === 'current' ? Math.round(gapCount * 0.65) : Math.round(gapCount * 0.04);

  document.getElementById('metrics').innerHTML = `
    <div class="metric"><div class="label">Apps outside SSO</div><div class="number ${phase==='current'?'danger':'safe'}">${phase==='current'?gapCount.toLocaleString():'0'}</div></div>
    <div class="metric"><div class="label">Unprotected apps</div><div class="number ${phase==='current'?'danger':'safe'}">${phase==='current'?gapCount.toLocaleString():'0'}</div></div>
    <div class="metric"><div class="label">Credential reuse risk</div><div class="number ${phase==='current'?'danger':'safe'}">${credReuse.toLocaleString()} apps</div></div>
    <div class="metric"><div class="label">Annual risk exposure</div><div class="number ${phase==='current'?'danger':'safe'}">$${estRisk.toFixed(1)}M</div></div>
  `;

  document.getElementById('bar-chart').innerHTML = `
    <div class="bar-row"><span class="bar-label">SSO coverage</span><div class="bar-track"><div class="bar-fill sso" style="width:${ssoPct}%">${ssoPct}%</div></div></div>
    <div class="bar-row"><span class="bar-label">Bitwarden</span><div class="bar-track"><div class="bar-fill pwm" style="width:${pwmPct}%">${pwmPct>0?pwmPct+'%':''}</div></div></div>
    <div class="bar-row"><span class="bar-label">Unprotected</span><div class="bar-track"><div class="bar-fill gap" style="width:${unprotectedPct}%">${unprotectedPct>0?unprotectedPct+'%':''}</div></div></div>
  `;

  const rb = document.getElementById('risk-box');
  if (phase === 'current') {
    rb.className = 'risk-section danger';
    rb.innerHTML = `<h3>High risk: ${gapCount.toLocaleString()} apps have no centralized credential management</h3><p>Employees are using weak, reused, or shared passwords across ${gapCount.toLocaleString()} applications. Each is a potential entry point for credential stuffing, phishing, and account takeover. Without visibility, your security team cannot enforce policies, detect compromised credentials, or respond to incidents across ${Math.round(unprotectedPct)}% of your application surface.</p>`;
  } else {
    rb.className = 'risk-section safe';
    rb.innerHTML = `<h3>Full coverage: all ${total.toLocaleString()} applications under centralized management</h3><p>SSO covers ${ssoCount.toLocaleString()} applications with federated identity. Bitwarden extends protection to the remaining ${gapCount.toLocaleString()} applications with unique, strong credentials, secure autofill, vault sharing, and full admin visibility. Together, they eliminate the coverage gap and give your security team complete oversight.</p>`;
  }

  const cb = document.getElementById('cost-box');
  if (phase === 'current') {
    const annualCost = estRisk;
    cb.className = 'cost-callout danger';
    cb.innerHTML = `<div class="cost-inner"><div class="cost-eyebrow">Estimated annual risk exposure</div><div class="cost-headline">$${annualCost.toFixed(1)}M</div><div class="cost-body">Based on ${gapCount.toLocaleString()} unmanaged applications and a $${costM.toFixed(1)}M average breach cost. A single compromised credential in the unprotected gap can cascade into a full breach.</div></div><div class="cost-divider"></div><div class="cost-footer"><div class="cost-icon">!</div><div class="cost-footer-text">${Math.round(unprotectedPct)}% of your application surface is invisible to your security team right now.</div></div>`;
  } else {
    const sav = (costM * (gapCount / total) * 0.15).toFixed(1);
    cb.className = 'cost-callout safe';
    cb.innerHTML = `<div class="cost-inner"><div class="cost-eyebrow">Annual exposure eliminated</div><div class="cost-headline">~$${sav}M risk reduced</div><div class="cost-body">Every application is now under centralized management. Credential-based attack surface drops by ${100-ssoPct}%, with full incident response visibility across all ${total.toLocaleString()} apps.</div></div><div class="cost-divider"></div><div class="cost-footer"><div class="cost-icon">&#10003;</div><div class="cost-footer-text">100% of applications covered by SSO + Bitwarden together.</div></div>`;
  }
}

update();
</script>
